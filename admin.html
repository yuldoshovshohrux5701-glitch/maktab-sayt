<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

  #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border-radius: 16px; padding: 2.5rem; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .login-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; text-align: center; color: #0C447C; }
  .login-box input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: #185FA5; }
  .btn-login { width: 100%; padding: 11px; background: #0C447C; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-login:hover { background: #185FA5; }
  .login-error { color: #c0392b; font-size: 13px; text-align: center; margin-top: 10px; }

  #admin-page { display: none; }
  .topbar { background: #0C447C; color: #fff; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .btn-chiq { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }

  .admin-body { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 1rem 0; flex-shrink: 0; }
  .side-btn { display: block; width: 100%; text-align: left; padding: 10px 20px; background: none; border: none; font-size: 14px; cursor: pointer; font-family: inherit; color: #444; transition: all 0.1s; }
  .side-btn:hover, .side-btn.active { background: #E6F1FB; color: #0C447C; font-weight: 600; }

  .main { flex: 1; padding: 2rem; }
  .main h2 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }

  .tab { display: none; }
  .tab.active { display: block; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
  th { background: #185FA5; color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }

  .btn { padding: 7px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; }
  .btn-yashil { background: #1D9E75; color: #fff; }
  .btn-yashil:hover { background: #0F6E56; }
  .btn-qizil { background: #e74c3c; color: #fff; }
  .btn-qizil:hover { background: #c0392b; }
  .btn-sariq { background: #f39c12; color: #fff; }
  .btn-sariq:hover { background: #d68910; }
  .btn-ko'k { background: #0C447C; color: #fff; }
  .btn-ko'k:hover { background: #185FA5; }

  .forma { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e8e8e8; }
  .forma h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #0C447C; }
  .forma label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 10px; }
  .forma input, .forma textarea, .forma select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; }
  .forma input:focus, .forma textarea:focus { border-color: #185FA5; }
  .forma textarea { resize: vertical; min-height: 80px; }
  .forma-qator { display: flex; gap: 10px; margin-top: 14px; }

  .xabar { padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
  .xabar.ok { background: #EAF3DE; color: #3B6D11; }
  .xabar.xato { background: #FCEBEB; color: #A32D2D; }

  .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
  .file-input-wrapper input { position: absolute; left: -9999px; }
  .file-input-btn { display: block; width: 100%; padding: 9px 12px; border: 2px dashed #185FA5; border-radius: 7px; text-align: center; cursor: pointer; color: #185FA5; font-size: 13px; }
  .preview-img { max-width: 200px; max-height: 150px; margin-top: 10px; border-radius: 8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <h2>🔐 Admin kirish</h2>
    <input type="text" id="login-input" placeholder="Login" value="admin">
    <input type="password" id="parol-input" placeholder="Parol">
    <button class="btn-login" onclick="kirish()">Kirish</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-page">
  <div class="topbar">
    <div class="topbar-title">🏫 Admin Panel</div>
    <button class="btn-chiq" onclick="chiqish()">Chiqish</button>
  </div>
  <div class="admin-body">
    <div class="sidebar">
      <button class="side-btn active" onclick="showTab('yangiliklar', this)">📰 Yangiliklar</button>
      <button class="side-btn" onclick="showTab('oqituvchilar', this)">👨‍🏫 O'qituvchilar</button>
      <button class="side-btn" onclick="showTab('hero', this)">🏠 Bosh sahifa</button>
      <button class="side-btn" onclick="showTab('haqida', this)">📖 Maktab haqida</button>
      <button class="side-btn" onclick="showTab('aloqa', this)">📞 Aloqa</button>
      <button class="side-btn" onclick="showTab('sozlamalar', this)">⚙️ Sozlamalar</button>
    </div>

    <div class="main">

      <!-- YANGILIKLAR -->
      <div id="tab-yangiliklar" class="tab active">
        <h2>📰 Yangiliklar</h2>
        <div id="xabar-y" class="xabar" style="display:none"></div>

        <div class="forma">
          <h3 id="y-forma-title">➕ Yangi yangilik</h3>
          <input type="hidden" id="y-id">
          <label>Badge</label>
          <input type="text" id="y-badge" placeholder="E'lon, Tadbir, Natija">
          <label>Badge turi</label>
          <select id="y-badgeType">
            <option value="default">Ko'k</option>
            <option value="green">Yashil</option>
            <option value="amber">Sariq</option>
          </select>
          <label>Sana</label>
          <input type="text" id="y-sana" placeholder="25 iyun, 2025">
          <label>Sarlavha</label>
          <textarea id="y-sarlavha" placeholder="Yangilik matni..."></textarea>
          <label>Tafsil (ixtiyoriy)</label>
          <textarea id="y-tafsil" placeholder="Batafsil ma'lumot..."></textarea>
          <label>Rasm yuklash</label>
          <div class="file-input-wrapper">
            <input type="file" id="y-rasm" accept="image/*">
            <span class="file-input-btn">Rasm tanlang</span>
          </div>
          <img id="y-rasm-preview" class="preview-img" style="display:none">
          <div class="forma-qator">
            <button class="btn btn-yashil" onclick="saqlYangilik()">💾 Saqlash</button>
            <button class="btn btn-sariq" onclick="tozaY()">✖ Bekor</button>
          </div>
        </div>

        <table>
          <thead><tr><th>Badge</th><th>Sana</th><th>Sarlavha</th><th>Amal</th></tr></thead>
          <tbody id="y-tbody"><tr><td colspan="4" style="text-align:center">Yuklanmoqda...</td></tr></tbody>
        </table>
      </div>

      <!-- O'QITUVCHILAR -->
      <div id="tab-oqituvchilar" class="tab">
        <h2>👨‍🏫 O'qituvchilar</h2>
        <div id="xabar-o" class="xabar" style="display:none"></div>

        <div class="forma">
          <h3 id="o-forma-title">➕ Yangi o'qituvchi</h3>
          <input type="hidden" id="o-id">
          <label>Bosh harflar (AA)</label>
          <input type="text" id="o-init" placeholder="AA" maxlength="2">
          <label>To'liq ism</label>
          <input type="text" id="o-ism" placeholder="Azimov Anvar">
          <label>Fan</label>
          <input type="text" id="o-fan" placeholder="Matematika">
          <label>Qisqa ma'lumot</label>
          <textarea id="o-bio" placeholder="O'qituvchi haqida..."></textarea>
          <label>Tajriba</label>
          <input type="text" id="o-tajriba" placeholder="18 yil tajriba">
          <label>Avatar rangi (hex)</label>
          <input type="text" id="o-avatarRang" placeholder="#E6F1FB" value="#E6F1FB">
          <label>Avatar matn rangi (hex)</label>
          <input type="text" id="o-avatarMatn" placeholder="#0C447C" value="#0C447C">
          <label>Tartib</label>
          <input type="number" id="o-tartib" placeholder="1" value="0">
          <label>Rasm yuklash</label>
          <div class="file-input-wrapper">
            <input type="file" id="o-rasm" accept="image/*">
            <span class="file-input-btn">Rasm tanlang</span>
          </div>
          <img id="o-rasm-preview" class="preview-img" style="display:none">
          <div class="forma-qator">
            <button class="btn btn-yashil" onclick="saqlO()">💾 Saqlash</button>
            <button class="btn btn-sariq" onclick="tozaO()">✖ Bekor</button>
          </div>
        </div>

        <table>
          <thead><tr><th>Ism</th><th>Fan</th><th>Tajriba</th><th>Amal</th></tr></thead>
          <tbody id="o-tbody"><tr><td colspan="4" style="text-align:center">Yuklanmoqda...</td></tr></tbody>
        </table>
      </div>

      <!-- HERO -->
      <div id="tab-hero" class="tab">
        <h2>🏠 Bosh sahifa</h2>
        <div id="xabar-h" class="xabar" style="display:none"></div>

        <div class="forma">
          <label>Maktab nomi</label>
          <input type="text" id="h-nomi" placeholder="1-sonli Umumta'lim Maktabi">
          <label>Tavsifi</label>
          <textarea id="h-tavsifi" placeholder="Toshkent shahri..."></textarea>
          <label>O'quvchilar soni</label>
          <input type="number" id="h-oquvchilar" placeholder="1200">
          <label>O'qituvchilar soni</label>
          <input type="number" id="h-oqituvchilar" placeholder="68">
          <label>Sinflar soni</label>
          <input type="number" id="h-sinflar" placeholder="42">
          <label>Tashkil etilgan yili</label>
          <input type="number" id="h-yili" placeholder="1975">
          <div class="forma-qator">
            <button class="btn btn-yashil" onclick="saqlHero()">💾 Saqlash</button>
          </div>
        </div>
      </div>

      <!-- MAKTAB HAQIDA -->
      <div id="tab-haqida" class="tab">
        <h2>📖 Maktab haqida</h2>
        <div id="xabar-mh" class="xabar" style="display:none"></div>

        <div class="forma">
          <label>Tarix</label>
          <textarea id="mh-tarix" placeholder="Maktabimiz 1975-yilda..."></textarea>
          <label>Maqsad</label>
          <textarea id="mh-maqsad" placeholder="Har bir o'quvchining..."></textarea>
          <label>Yutuqlar</label>
          <textarea id="mh-yutuqlar" placeholder="O'tgan o'quv yilida..."></textarea>
          <label>Moddiy baza</label>
          <textarea id="mh-moddiyBaza" placeholder="Zamonaviy laboratoriyalar..."></textarea>
          <label>Tillar</label>
          <textarea id="mh-tillar" placeholder="O'zbek tilida ta'lim..."></textarea>
          <label>Maktab hayoti</label>
          <textarea id="mh-hayot" placeholder="Turli to'garaklar..."></textarea>
          <div class="forma-qator">
            <button class="btn btn-yashil" onclick="saqlMH()">💾 Saqlash</button>
          </div>
        </div>
      </div>

      <!-- ALOQA -->
      <div id="tab-aloqa" class="tab">
        <h2>📞 Aloqa</h2>
        <div id="xabar-a" class="xabar" style="display:none"></div>

        <div class="forma">
          <label>Manzil</label>
          <input type="text" id="a-manzil" placeholder="Toshkent sh., Yunusobod tumani...">
          <label>Telefon</label>
          <input type="text" id="a-telefon" placeholder="+998 71 234 56 78">
          <label>Email</label>
          <input type="email" id="a-email" placeholder="maktab@email.com">
          <label>Ish vaqti</label>
          <input type="text" id="a-ishVaqti" placeholder="Dushanba–Juma: 8:00–18:00">
          <div class="forma-qator">
            <button class="btn btn-yashil" onclick="saqlAloqa()">💾 Saqlash</button>
          </div>
        </div>
      </div>

      <!-- SOZLAMALAR -->
      <div id="tab-sozlamalar" class="tab">
        <h2>⚙️ Sozlamalar</h2>
        <div id="xabar-s" class="xabar" style="display:none"></div>

        <div class="forma" style="max-width:400px">
          <h3>🔑 Parolni o'zgartirish</h3>
          <label>Yangi parol</label>
          <input type="password" id="yangi-parol" placeholder="Kamida 6 ta belgi">
          <label>Tasdiqlang</label>
          <input type="password" id="yangi-parol2" placeholder="Qaytadan kiriting">
          <div class="forma-qator">
            <button class="btn btn-ko'k" onclick="parolOzgartir()">💾 O'zgartirish</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  let TOKEN = localStorage.getItem('maktab_token') || '';
  const API = 'http://localhost:3000';

  function kirish() {
    const login = document.getElementById('login-input').value;
    const parol = document.getElementById('parol-input').value;
    fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, parol })
    })
    .then(r => r.json())
    .then(d => {
      if (d.token) {
        TOKEN = d.token;
        localStorage.setItem('maktab_token', TOKEN);
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('admin-page').style.display = 'block';
        yukleYangiliklar();
        yukleOqituvchilar();
        yukleHero();
        yukleMaktabHaqida();
        yukleAloqa();
      } else {
        document.getElementById('login-error').textContent = d.xato || 'Xato!';
      }
    });
  }

  function chiqish() {
    TOKEN = '';
    localStorage.removeItem('maktab_token');
    location.reload();
  }

  function showTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }

  function xabar(id, matn, tur) {
    const el = document.getElementById(id);
    el.textContent = matn;
    el.className = 'xabar ' + tur;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  // FILE PREVIEW
  document.getElementById('y-rasm')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('y-rasm-preview').src = ev.target.result;
        document.getElementById('y-rasm-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('o-rasm')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('o-rasm-preview').src = ev.target.result;
        document.getElementById('o-rasm-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // YANGILIKLAR
  async function saqlYangilik() {
    const id = document.getElementById('y-id').value;
    const formData = new FormData();
    formData.append('badge', document.getElementById('y-badge').value);
    formData.append('badgeType', document.getElementById('y-badgeType').value);
    formData.append('sana', document.getElementById('y-sana').value);
    formData.append('sarlavha', document.getElementById('y-sarlavha').value);
    formData.append('tafsil', document.getElementById('y-tafsil').value);
    const file = document.getElementById('y-rasm').files[0];
    if (file) formData.append('rasm', file);

    const url = id ? API + '/api/yangiliklar/' + id : API + '/api/yangiliklar';
    const method = id ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: formData
    });

    if (res.ok) {
      xabar('xabar-y', 'Saqlandi ✓', 'ok');
      tozaY();
      yukleYangiliklar();
    } else {
      xabar('xabar-y', 'Xatolik yuz berdi', 'xato');
    }
  }

  async function yukleYangiliklar() {
    const res = await fetch(API + '/api/yangiliklar');
    const list = await res.json();
    const tbody = document.getElementById('y-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Hali yangilik yo\'q</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(y => `
      <tr>
        <td><span style="background:#E6F1FB;color:#0C447C;padding:3px 8px;border-radius:10px;font-size:11px">${y.badge}</span></td>
        <td>${y.sana}</td>
        <td>${y.sarlavha}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-sariq" onclick="tahrirlY('${y._id}','${y.badge}','${y.badgeType}','${y.sana}','${y.sarlavha.replace(/'/g,"\\'")}')">✏️</button>
          <button class="btn btn-qizil" onclick="ochirY('${y._id}')">🗑️</button>
        </td>
      </tr>`).join('');
  }

  function tahrirlY(id, badge, badgeType, sana, sarlavha) {
    document.getElementById('y-id').value = id;
    document.getElementById('y-badge').value = badge;
    document.getElementById('y-badgeType').value = badgeType;
    document.getElementById('y-sana').value = sana;
    document.getElementById('y-sarlavha').value = sarlavha;
    document.getElementById('y-forma-title').textContent = '✏️ Tahrirlash';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function ochirY(id) {
    if (!confirm('O\'chirasizmi?')) return;
    await fetch(API + '/api/yangiliklar/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + TOKEN } });
    yukleYangiliklar();
  }

  function tozaY() {
    document.getElementById('y-id').value = '';
    document.getElementById('y-badge').value = '';
    document.getElementById('y-badgeType').value = 'default';
    document.getElementById('y-sana').value = '';
    document.getElementById('y-sarlavha').value = '';
    document.getElementById('y-tafsil').value = '';
    document.getElementById('y-rasm').value = '';
    document.getElementById('y-rasm-preview').style.display = 'none';
    document.getElementById('y-forma-title').textContent = '➕ Yangi yangilik';
  }

  // O'QITUVCHILAR
  async function saqlO() {
    const id = document.getElementById('o-id').value;
    const formData = new FormData();
    formData.append('init', document.getElementById('o-init').value.toUpperCase());
    formData.append('ism', document.getElementById('o-ism').value);
    formData.append('fan', document.getElementById('o-fan').value);
    formData.append('bio', document.getElementById('o-bio').value);
    formData.append('tajriba', document.getElementById('o-tajriba').value);
    formData.append('avatarRang', document.getElementById('o-avatarRang').value);
    formData.append('avatarMatn', document.getElementById('o-avatarMatn').value);
    formData.append('tartib', document.getElementById('o-tartib').value);
    const file = document.getElementById('o-rasm').files[0];
    if (file) formData.append('rasm', file);

    const url = id ? API + '/api/oqituvchilar/' + id : API + '/api/oqituvchilar';
    const method = id ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: formData
    });

    if (res.ok) {
      xabar('xabar-o', 'Saqlandi ✓', 'ok');
      tozaO();
      yukleOqituvchilar();
    } else {
      xabar('xabar-o', 'Xatolik yuz berdi', 'xato');
    }
  }

  async function yukleOqituvchilar() {
    const res = await fetch(API + '/api/oqituvchilar');
    const list = await res.json();
    const tbody = document.getElementById('o-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Hali o\'qituvchi yo\'q</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(o => `
      <tr>
        <td>${o.ism}</td>
        <td>${o.fan}</td>
        <td>${o.tajriba}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-sariq" onclick="tahrirlO('${o._id}','${o.init}','${o.ism.replace(/'/g,"\\'")}','${o.fan.replace(/'/g,"\\'")}','${o.tajriba}','${o.avatarRang}','${o.avatarMatn}','${o.tartib}')">✏️</button>
          <button class="btn btn-qizil" onclick="ochirO('${o._id}')">🗑️</button>
        </td>
      </tr>`).join('');
  }

  function tahrirlO(id, init, ism, fan, tajriba, avatarRang, avatarMatn, tartib) {
    document.getElementById('o-id').value = id;
    document.getElementById('o-init').value = init;
    document.getElementById('o-ism').value = ism;
    document.getElementById('o-fan').value = fan;
    document.getElementById('o-tajriba').value = tajriba;
    document.getElementById('o-avatarRang').value = avatarRang;
    document.getElementById('o-avatarMatn').value = avatarMatn;
    document.getElementById('o-tartib').value = tartib;
    document.getElementById('o-forma-title').textContent = '✏️ Tahrirlash';
  }

  async function ochirO(id) {
    if (!confirm('O\'chirasizmi?')) return;
    await fetch(API + '/api/oqituvchilar/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + TOKEN } });
    yukleOqituvchilar();
  }

  function tozaO() {
    document.getElementById('o-id').value = '';
    document.getElementById('o-init').value = '';
    document.getElementById('o-ism').value = '';
    document.getElementById('o-fan').value = '';
    document.getElementById('o-bio').value = '';
    document.getElementById('o-tajriba').value = '';
    document.getElementById('o-avatarRang').value = '#E6F1FB';

  // PAROL
  async function parolOzgartir() {
    const p1 = document.getElementById('yangi-parol').value;
    const p2 = document.getElementById('yangi-parol2').value;
    if (p1 !== p2) {
      xabar('xabar-s', 'Parollar mos kelmadi!', 'xato');
      return;
    }
    const res = await fetch(API + '/api/parol', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body: JSON.stringify({ yangiParol: p1 })
    });
    const data = await res.json();
    if (data.ok) xabar('xabar-s', 'Parol o\'zgartirildi ✓', 'ok');
    else xabar('xabar-s', data.xato || 'Xatolik', 'xato');
  }
